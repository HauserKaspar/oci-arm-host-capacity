name: Create OCI A1 Instance

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        availability_domain:
          - 'siuQ:EU-FRANKFURT-1-AD-1'
          - 'siuQ:EU-FRANKFURT-1-AD-2'
          - 'siuQ:EU-FRANKFURT-1-AD-3'
    name: Create instance (${{ matrix.availability_domain }})
    steps:
      - uses: actions/checkout@v3

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-progress

      - name: Write OCI private key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          echo "$OCI_PRIVATE_KEY" | base64 -d > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem

      - name: Run instance creator
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ matrix.availability_domain }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: 4
          OCI_MEMORY_IN_GBS: 24
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_MAX_INSTANCES: 1
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
